spring.application.name=keycapDesignBE
server.port=${PORT:8080}
server.forward-headers-strategy=framework


# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}








spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=${HIBERNATE_BATCH_FETCH_SIZE:50}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:INFO}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# Public URLs and CORS
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}


# Health check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true


# UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true


# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}


# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email


# Gemini AI
gemini.api-key=${GEMINI_API_KEY:}
gemini.endpoint=${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models/%s:generateContent}
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
gemini.temperature=${GEMINI_TEMPERATURE:0.4}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:1000}
gemini.thinking-budget=${GEMINI_THINKING_BUDGET:0}
gemini.timeout-ms=${GEMINI_TIMEOUT_MS:10000}
ai.provider.debug=${AI_PROVIDER_DEBUG:false}
ai.system.email=${AI_SYSTEM_EMAIL:ai-assistant@keycap.local}
ai.system.name=${AI_SYSTEM_NAME:Keycap AI Assistant}
ai.system.password=${AI_SYSTEM_PASSWORD:}
ai.response.max-recommendations=${AI_MAX_RECOMMENDATIONS:5}


# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}


# Mail
mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}


# PayOS
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:${app.frontend-url}/payment-result}
payos.cancel-url=${PAYOS_CANCEL_URL:${app.frontend-url}/payment-result?status=CANCELLED}
